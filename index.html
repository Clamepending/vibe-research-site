<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="DM your agent powered research lab on your GPU cluster"
    >
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23111114'/%3E%3Cpath d='M13 42 25 17l10 21 6-13 10 17' fill='none' stroke='%23ff8c5f' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M13 50h38' stroke='%23f5f1ec' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E"
    >
    <title>vibe research</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        --bg: #101114;
        --panel: #191a1f;
        --panel-2: #23242b;
        --line: rgba(245, 241, 236, 0.12);
        --text: #f5f1ec;
        --muted: #a8a3a0;
        --accent: #ff8c5f;
        --accent-2: #7ac7b7;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg);
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(135deg, rgba(255, 140, 95, 0.12), transparent 34rem),
          linear-gradient(315deg, rgba(122, 199, 183, 0.1), transparent 30rem),
          var(--bg);
        color: var(--text);
        font-synthesis: none;
        text-rendering: optimizeLegibility;
      }

      button,
      code {
        font: inherit;
      }

      button {
        border: 0;
      }

      a {
        color: inherit;
      }

      .page {
        width: min(980px, calc(100% - 32px));
        min-height: 100vh;
        margin: 0 auto;
        padding: clamp(56px, 10vh, 110px) 0 44px;
        display: grid;
        align-content: start;
        gap: 34px;
      }

      .hero {
        display: grid;
        gap: 22px;
      }

      h1 {
        margin: 0;
        color: var(--text);
        font-size: clamp(3.4rem, 11vw, 8.4rem);
        font-weight: 850;
        line-height: 0.86;
        letter-spacing: 0;
      }

      .description {
        max-width: 720px;
        margin: 0;
        color: var(--muted);
        font-size: clamp(1.16rem, 2.7vw, 1.7rem);
        line-height: 1.42;
      }

      .command-block {
        width: min(780px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        display: grid;
        grid-template-columns: 1fr 46px;
        align-items: stretch;
        overflow: hidden;
        background: rgba(13, 14, 18, 0.8);
        box-shadow: 0 20px 68px rgba(0, 0, 0, 0.26);
      }

      pre {
        min-width: 0;
        margin: 0;
        padding: 18px 20px;
        overflow-x: auto;
      }

      code {
        color: #f7f2eb;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: clamp(0.86rem, 2vw, 1rem);
        line-height: 1.45;
        white-space: nowrap;
      }

      .copy-button {
        width: 46px;
        min-height: 46px;
        border-left: 1px solid var(--line);
        display: grid;
        place-items: center;
        background: var(--panel-2);
        color: var(--text);
        cursor: pointer;
        transition:
          background 160ms ease,
          color 160ms ease;
      }

      .copy-button:hover,
      .copy-button:focus-visible {
        background: #2e3039;
        color: var(--accent);
        outline: none;
      }

      .copy-button svg {
        width: 20px;
        height: 20px;
      }

      .copy-status {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      }

      .carousel-shell {
        display: grid;
        gap: 16px;
      }

      .carousel-controls {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .carousel-button {
        width: 40px;
        height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: rgba(25, 26, 31, 0.86);
        color: var(--text);
        cursor: pointer;
        transition:
          border-color 160ms ease,
          color 160ms ease,
          transform 160ms ease;
      }

      .carousel-button:hover,
      .carousel-button:focus-visible {
        border-color: rgba(255, 140, 95, 0.56);
        color: var(--accent);
        outline: none;
      }

      .carousel-button:active {
        transform: translateY(1px);
      }

      .carousel-button svg {
        width: 19px;
        height: 19px;
      }

      .tweet-carousel {
        display: grid;
        grid-auto-columns: minmax(290px, min(560px, 86vw));
        grid-auto-flow: column;
        gap: 18px;
        overflow-x: auto;
        overscroll-behavior-x: contain;
        padding: 2px 2px 18px;
        scroll-padding-inline: 2px;
        scroll-snap-type: x mandatory;
        scrollbar-color: rgba(255, 140, 95, 0.7) transparent;
      }

      .tweet-card {
        min-height: 280px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        display: grid;
        place-items: center;
        background:
          linear-gradient(180deg, rgba(35, 36, 43, 0.9), rgba(17, 18, 22, 0.9)),
          var(--panel);
        scroll-snap-align: start;
      }

      .twitter-tweet {
        width: 100% !important;
        margin: 0 !important;
        color: var(--muted);
      }

      .tweet-fallback {
        width: 100%;
        min-height: 220px;
        display: grid;
        place-items: center;
        text-align: center;
      }

      .tweet-fallback a {
        color: var(--text);
        font-size: 1.05rem;
        font-weight: 760;
        text-decoration-color: rgba(255, 140, 95, 0.6);
        text-underline-offset: 4px;
      }

      @media (max-width: 640px) {
        .page {
          width: min(100% - 24px, 980px);
          padding-top: 42px;
          gap: 26px;
        }

        .hero {
          gap: 18px;
        }

        .command-block {
          grid-template-columns: 1fr 44px;
        }

        pre {
          padding: 15px 14px;
        }

        code {
          white-space: normal;
          overflow-wrap: anywhere;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero" aria-labelledby="hero-title">
        <h1 id="hero-title">vibe research</h1>
        <p class="description">DM your agent powered research lab on your GPU cluster</p>
        <div class="command-block">
          <pre><code id="install-command">curl -fsSL https://vibe-research.net/install.sh | bash</code></pre>
          <button class="copy-button" type="button" aria-label="Copy install command" title="Copy install command">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="9" y="9" width="10" height="10" rx="2" stroke="currentColor" stroke-width="2"/>
              <path d="M5 15V7a2 2 0 0 1 2-2h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <span class="copy-status" aria-live="polite"></span>
        </div>
      </section>

      <section class="carousel-shell" aria-label="Twitter posts">
        <div class="carousel-controls" aria-hidden="false">
          <button class="carousel-button" type="button" data-carousel-prev aria-label="Previous post" title="Previous post">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="m15 18-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="carousel-button" type="button" data-carousel-next aria-label="Next post" title="Next post">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="tweet-carousel">
          <article class="tweet-card">
            <blockquote class="twitter-tweet" data-theme="dark" data-dnt="true">
              <a href="https://twitter.com/clamepending/status/2039185482639462763?ref_src=twsrc%5Etfw">View @clamepending's post on X</a>
            </blockquote>
          </article>
          <article class="tweet-card">
            <blockquote class="twitter-tweet" data-theme="dark" data-dnt="true">
              <a href="https://twitter.com/clamepending/status/2046446202657616231?ref_src=twsrc%5Etfw">View @clamepending's post on X</a>
            </blockquote>
          </article>
        </div>
      </section>
    </main>

    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    <script>
      const command = document.querySelector("#install-command");
      const copyButton = document.querySelector(".copy-button");
      const copyStatus = document.querySelector(".copy-status");
      const carousel = document.querySelector(".tweet-carousel");
      const previous = document.querySelector("[data-carousel-prev]");
      const next = document.querySelector("[data-carousel-next]");

      copyButton.addEventListener("click", async () => {
        const text = command.textContent.trim();

        try {
          await navigator.clipboard.writeText(text);
          copyStatus.textContent = "Copied";
        } catch {
          const selection = window.getSelection();
          const range = document.createRange();
          range.selectNodeContents(command);
          selection.removeAllRanges();
          selection.addRange(range);
          copyStatus.textContent = "Selected";
        }
      });

      function scrollCarousel(direction) {
        const card = carousel.querySelector(".tweet-card");
        const amount = card ? card.getBoundingClientRect().width + 18 : 420;
        carousel.scrollBy({ left: direction * amount, behavior: "smooth" });
      }

      previous.addEventListener("click", () => scrollCarousel(-1));
      next.addEventListener("click", () => scrollCarousel(1));
    </script>
  </body>
</html>
