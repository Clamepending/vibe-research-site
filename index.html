<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="DM your agent powered research lab on your GPU cluster"
    >
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23111114'/%3E%3Cpath d='M13 42 25 17l10 21 6-13 10 17' fill='none' stroke='%23ff8c5f' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M13 50h38' stroke='%23f5f1ec' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E"
    >
    <title>vibe research</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        --bg: #07090d;
        --panel-2: #23242b;
        --line: rgba(245, 241, 236, 0.12);
        --text: #f5f1ec;
        --muted: #a8a3a0;
        --accent: #ff8c5f;
        --accent-2: #7ac7b7;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg);
      }

      body {
        min-height: 100vh;
        margin: 0;
        overflow-x: hidden;
        background: var(--bg);
        color: var(--text);
        font-synthesis: none;
        text-rendering: optimizeLegibility;
      }

      button,
      code {
        font: inherit;
      }

      button {
        border: 0;
      }

      a {
        color: inherit;
      }

      .graph-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          linear-gradient(90deg, rgba(7, 9, 13, 0.12), rgba(7, 9, 13, 0.5) 72%),
          linear-gradient(180deg, rgba(7, 9, 13, 0.02), rgba(7, 9, 13, 0.7));
      }

      .page {
        position: relative;
        z-index: 1;
        width: min(980px, calc(100% - 32px));
        min-height: 100vh;
        margin: 0 auto;
        padding: clamp(56px, 10vh, 110px) 0 44px;
        display: grid;
        align-content: start;
        gap: 34px;
      }

      .hero {
        display: grid;
        gap: 22px;
      }

      h1 {
        margin: 0;
        color: var(--text);
        font-size: clamp(3.4rem, 11vw, 8.4rem);
        font-weight: 850;
        line-height: 0.86;
        letter-spacing: 0;
      }

      .description {
        max-width: 720px;
        margin: 0;
        color: var(--muted);
        font-size: clamp(1.16rem, 2.7vw, 1.7rem);
        line-height: 1.42;
      }

      .command-block {
        width: min(780px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        display: grid;
        grid-template-columns: 1fr 46px;
        align-items: stretch;
        overflow: hidden;
        background: rgba(13, 14, 18, 0.8);
        box-shadow: 0 20px 68px rgba(0, 0, 0, 0.26);
      }

      pre {
        min-width: 0;
        margin: 0;
        padding: 18px 20px;
        overflow-x: auto;
      }

      code {
        color: #f7f2eb;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: clamp(0.86rem, 2vw, 1rem);
        line-height: 1.45;
        white-space: nowrap;
      }

      .copy-button {
        width: 46px;
        min-height: 46px;
        border-left: 1px solid var(--line);
        display: grid;
        place-items: center;
        background: var(--panel-2);
        color: var(--text);
        cursor: pointer;
        transition:
          background 160ms ease,
          color 160ms ease;
      }

      .copy-button:hover,
      .copy-button:focus-visible {
        background: #2e3039;
        color: var(--accent);
        outline: none;
      }

      .copy-button svg {
        width: 20px;
        height: 20px;
      }

      .copy-status {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      }

      .agents-section {
        display: grid;
        gap: 14px;
      }

      .section-title {
        margin: 0;
        color: rgba(245, 241, 236, 0.62);
        font-size: 0.78rem;
        font-weight: 780;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .agent-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      .agent-card {
        min-height: 96px;
        border: 1px solid rgba(245, 241, 236, 0.1);
        border-radius: 8px;
        padding: 14px 12px;
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 11px;
        background: rgba(10, 12, 17, 0.58);
        backdrop-filter: blur(8px);
      }

      .agent-logo {
        width: 34px;
        height: 34px;
        object-fit: contain;
      }

      .agent-logo.is-inverted {
        filter: invert(1);
      }

      .agent-name {
        color: var(--text);
        font-size: 0.88rem;
        font-weight: 760;
        line-height: 1.2;
        text-align: center;
      }

      .carousel-shell {
        display: grid;
        gap: 16px;
      }

      .carousel-controls {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .carousel-button {
        width: 40px;
        height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: rgba(25, 26, 31, 0.86);
        color: var(--text);
        cursor: pointer;
        transition:
          border-color 160ms ease,
          color 160ms ease,
          transform 160ms ease;
      }

      .carousel-button:hover,
      .carousel-button:focus-visible {
        border-color: rgba(255, 140, 95, 0.56);
        color: var(--accent);
        outline: none;
      }

      .carousel-button:active {
        transform: translateY(1px);
      }

      .carousel-button svg {
        width: 19px;
        height: 19px;
      }

      .tweet-carousel {
        display: grid;
        grid-auto-columns: minmax(300px, min(560px, 86vw));
        grid-auto-flow: column;
        gap: 28px;
        overflow-x: auto;
        overscroll-behavior-x: contain;
        padding: 0 2px 18px;
        scroll-padding-inline: 2px;
        scroll-snap-type: x mandatory;
        scrollbar-color: rgba(255, 140, 95, 0.7) transparent;
      }

      .tweet-card {
        position: relative;
        min-height: 260px;
        display: grid;
        align-items: start;
        overflow: hidden;
        border-radius: 8px;
        scroll-snap-align: start;
      }

      .tweet-card::before,
      .tweet-card::after {
        content: "";
        position: absolute;
        bottom: -1px;
        z-index: 3;
        background: var(--bg);
        pointer-events: none;
      }

      .tweet-card::before {
        right: -1px;
        left: -1px;
        height: 12px;
      }

      .tweet-card::after {
        right: -1px;
        width: 54px;
        height: 54px;
        clip-path: polygon(100% 0, 100% 100%, 0 100%);
      }

      .tweet-card iframe {
        width: calc(100% + 4px) !important;
        max-width: calc(100% + 4px) !important;
        margin: -2px 0 0 -2px !important;
      }

      .twitter-tweet {
        width: 100% !important;
        margin: 0 !important;
        color: var(--muted);
      }

      .tweet-fallback {
        width: 100%;
        min-height: 220px;
        display: grid;
        place-items: center;
        text-align: center;
      }

      .tweet-fallback a {
        color: var(--text);
        font-size: 1.05rem;
        font-weight: 760;
        text-decoration-color: rgba(255, 140, 95, 0.6);
        text-underline-offset: 4px;
      }

      @media (max-width: 640px) {
        .page {
          width: min(100% - 24px, 980px);
          padding-top: 42px;
          gap: 26px;
        }

        .hero {
          gap: 18px;
        }

        .command-block {
          grid-template-columns: 1fr 44px;
        }

        pre {
          padding: 15px 14px;
        }

        code {
          white-space: normal;
          overflow-wrap: anywhere;
        }

        .agent-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .agent-card:last-child {
          grid-column: 1 / -1;
        }
      }
    </style>
  </head>
  <body>
    <canvas class="graph-bg" aria-hidden="true"></canvas>
    <main class="page">
      <section class="hero" aria-labelledby="hero-title">
        <h1 id="hero-title">vibe research</h1>
        <p class="description">DM your agent powered research lab on your GPU cluster</p>
        <div class="command-block">
          <pre><code id="install-command">curl -fsSL https://vibe-research.net/install.sh | bash</code></pre>
          <button class="copy-button" type="button" aria-label="Copy install command" title="Copy install command">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="9" y="9" width="10" height="10" rx="2" stroke="currentColor" stroke-width="2"/>
              <path d="M5 15V7a2 2 0 0 1 2-2h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <span class="copy-status" aria-live="polite"></span>
        </div>
      </section>

      <section class="agents-section" aria-labelledby="agents-title">
        <h2 class="section-title" id="agents-title">Supported agents</h2>
        <div class="agent-grid">
          <div class="agent-card">
            <img class="agent-logo is-inverted" src="https://cdn.jsdelivr.net/npm/simple-icons@latest/icons/openai.svg" alt="" loading="lazy">
            <span class="agent-name">Codex</span>
          </div>
          <div class="agent-card">
            <img class="agent-logo" src="https://cdn.simpleicons.org/anthropic/white" alt="" loading="lazy">
            <span class="agent-name">Claude Code</span>
          </div>
          <div class="agent-card">
            <img class="agent-logo" src="https://cdn.simpleicons.org/googlegemini/white" alt="" loading="lazy">
            <span class="agent-name">Gemini CLI</span>
          </div>
          <div class="agent-card">
            <img class="agent-logo" src="https://opencode.ai/favicon.svg" alt="" loading="lazy">
            <span class="agent-name">opencode</span>
          </div>
          <div class="agent-card">
            <img class="agent-logo" src="https://cdn.simpleicons.org/huggingface/white" alt="" loading="lazy">
            <span class="agent-name">HF ML Intern</span>
          </div>
        </div>
      </section>

      <section class="carousel-shell" aria-label="Twitter posts">
        <div class="carousel-controls" aria-hidden="false">
          <button class="carousel-button" type="button" data-carousel-prev aria-label="Previous post" title="Previous post">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="m15 18-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="carousel-button" type="button" data-carousel-next aria-label="Next post" title="Next post">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="tweet-carousel">
          <article class="tweet-card">
            <blockquote class="twitter-tweet" data-theme="dark" data-dnt="true" data-cards="hidden" data-conversation="none">
              <a href="https://twitter.com/clamepending/status/2039185482639462763?ref_src=twsrc%5Etfw">View @clamepending's post on X</a>
            </blockquote>
          </article>
          <article class="tweet-card">
            <blockquote class="twitter-tweet" data-theme="dark" data-dnt="true" data-conversation="none">
              <a href="https://twitter.com/clamepending/status/2046446202657616231?ref_src=twsrc%5Etfw">View @clamepending's post on X</a>
            </blockquote>
          </article>
        </div>
      </section>
    </main>

    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    <script>
      const graphCanvas = document.querySelector(".graph-bg");
      const graphContext = graphCanvas.getContext("2d");
      const pointer = {
        x: window.innerWidth * 0.72,
        y: window.innerHeight * 0.34,
        active: false,
      };
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      let graphWidth = 0;
      let graphHeight = 0;
      let graphRatio = 1;
      let nodes = [];

      const command = document.querySelector("#install-command");
      const copyButton = document.querySelector(".copy-button");
      const copyStatus = document.querySelector(".copy-status");
      const carousel = document.querySelector(".tweet-carousel");
      const previous = document.querySelector("[data-carousel-prev]");
      const next = document.querySelector("[data-carousel-next]");

      function resetGraph() {
        graphRatio = Math.min(window.devicePixelRatio || 1, 2);
        graphWidth = window.innerWidth;
        graphHeight = window.innerHeight;
        graphCanvas.width = Math.floor(graphWidth * graphRatio);
        graphCanvas.height = Math.floor(graphHeight * graphRatio);
        graphCanvas.style.width = `${graphWidth}px`;
        graphCanvas.style.height = `${graphHeight}px`;
        graphContext.setTransform(graphRatio, 0, 0, graphRatio, 0, 0);

        const nodeCount = Math.round(
          Math.min(150, Math.max(70, (graphWidth * graphHeight) / 14500))
        );

        nodes = Array.from({ length: nodeCount }, () => {
          const speed = reducedMotion ? 0 : 0.14 + Math.random() * 0.28;
          const angle = Math.random() * Math.PI * 2;

          return {
            x: Math.random() * graphWidth,
            y: Math.random() * graphHeight,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            r: 0.9 + Math.random() * 1.7,
            tint: Math.random() > 0.5 ? "warm" : "cool",
          };
        });
      }

      function pointerGlow(x, y) {
        const dx = x - pointer.x;
        const dy = y - pointer.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        const radius = Math.min(420, Math.max(260, graphWidth * 0.26));
        const glow = Math.max(0, 1 - distance / radius);
        return pointer.active ? glow * glow : glow * glow * 0.28;
      }

      function drawGraph() {
        graphContext.clearRect(0, 0, graphWidth, graphHeight);
        graphContext.fillStyle = "#07090d";
        graphContext.fillRect(0, 0, graphWidth, graphHeight);

        const maxDistance = Math.min(210, Math.max(130, graphWidth / 7));

        for (let index = 0; index < nodes.length; index += 1) {
          const node = nodes[index];

          if (!reducedMotion) {
            node.x += node.vx;
            node.y += node.vy;

            if (node.x < -12) node.x = graphWidth + 12;
            if (node.x > graphWidth + 12) node.x = -12;
            if (node.y < -12) node.y = graphHeight + 12;
            if (node.y > graphHeight + 12) node.y = -12;
          }

          for (let nextIndex = index + 1; nextIndex < nodes.length; nextIndex += 1) {
            const other = nodes[nextIndex];
            const dx = node.x - other.x;
            const dy = node.y - other.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > maxDistance) continue;

            const midX = (node.x + other.x) / 2;
            const midY = (node.y + other.y) / 2;
            const localGlow = pointerGlow(midX, midY);
            const alpha = (1 - distance / maxDistance) * (0.14 + localGlow * 1.05);

            graphContext.strokeStyle = `rgba(245, 241, 236, ${alpha})`;
            graphContext.lineWidth = 0.65 + localGlow * 1.7;
            graphContext.beginPath();
            graphContext.moveTo(node.x, node.y);
            graphContext.lineTo(other.x, other.y);
            graphContext.stroke();
          }
        }

        for (const node of nodes) {
          const localGlow = pointerGlow(node.x, node.y);
          const alpha = 0.22 + localGlow * 0.9;
          const color = node.tint === "warm" ? "255, 140, 95" : "122, 199, 183";

          graphContext.fillStyle = `rgba(${color}, ${alpha})`;
          graphContext.beginPath();
          graphContext.arc(node.x, node.y, node.r + localGlow * 2.7, 0, Math.PI * 2);
          graphContext.fill();

          if (localGlow > 0.18) {
            graphContext.fillStyle = `rgba(245, 241, 236, ${localGlow * 0.72})`;
            graphContext.beginPath();
            graphContext.arc(node.x, node.y, node.r * 0.54, 0, Math.PI * 2);
            graphContext.fill();
          }
        }

        requestAnimationFrame(drawGraph);
      }

      window.addEventListener("pointermove", (event) => {
        pointer.x = event.clientX;
        pointer.y = event.clientY;
        pointer.active = true;
      });

      window.addEventListener("pointerleave", () => {
        pointer.active = false;
      });

      window.addEventListener("resize", resetGraph);

      copyButton.addEventListener("click", async () => {
        const text = command.textContent.trim();

        try {
          await navigator.clipboard.writeText(text);
          copyStatus.textContent = "Copied";
        } catch {
          const selection = window.getSelection();
          const range = document.createRange();
          range.selectNodeContents(command);
          selection.removeAllRanges();
          selection.addRange(range);
          copyStatus.textContent = "Selected";
        }
      });

      function scrollCarousel(direction) {
        const card = carousel.querySelector(".tweet-card");
        const amount = card ? card.getBoundingClientRect().width + 28 : 420;
        carousel.scrollBy({ left: direction * amount, behavior: "smooth" });
      }

      previous.addEventListener("click", () => scrollCarousel(-1));
      next.addEventListener("click", () => scrollCarousel(1));

      resetGraph();
      requestAnimationFrame(drawGraph);
    </script>
  </body>
</html>
