<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vibe Research</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f1ea;
        color: #172126;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(88vw, 760px);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2.6rem, 10vw, 6.8rem);
        line-height: 0.88;
        letter-spacing: 0;
      }

      p {
        max-width: 56ch;
        margin: 0 0 28px;
        color: #4d5b61;
        font-size: 1.12rem;
        line-height: 1.65;
      }

      pre {
        overflow-x: auto;
        margin: 0;
        padding: 20px;
        border: 1px solid #d5cdc0;
        border-radius: 8px;
        background: #11181c;
        color: #f8f3ea;
        font-size: 1rem;
        line-height: 1.5;
      }

      code {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Vibe Research</h1>
      <p>Remote coding-agent infrastructure for experiments, shared memory, and browser-based terminals over Tailscale.</p>
      <pre><code>curl -fsSL https://vibe-research.net/install.sh | bash</code></pre>
    </main>
  </body>
</html>
